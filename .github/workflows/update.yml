name: Kubebuilder Update

on:
  schedule:
    - cron: '0 6 * * 1'  # Every Monday at 6:00 AM UTC
  pull_request:
    paths:
      - '.github/workflows/kubebuilder-update.yml'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Install Kubebuilder
        run: |
          curl -L -o kubebuilder "https://go.kubebuilder.io/dl/latest/$(go env GOOS)/$(go env GOARCH)"
          chmod +x kubebuilder
          sudo mv kubebuilder /usr/local/bin/

      - name: Run kubebuilder alpha update
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          kubebuilder alpha update --force

      - name: Detect merge branch
        id: extract_branch
        run: |
          MERGE_BRANCH=$(git branch --list 'tmp-kb-update-merge*' | tail -n 1 | sed 's/[* ]//g')
          echo "merge_branch=$MERGE_BRANCH" >> $GITHUB_OUTPUT

      - name: Push merge branch
        run: |
          git push origin "${{ steps.extract_branch.outputs.merge_branch }}" --force

      - name: Create pull request
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr create \
            --title "chore: update Kubebuilder scaffolding" \
            --body "Automated update via \`kubebuilder alpha update --force\`. Please review and merge." \
            --base main \
            --head "${{ steps.extract_branch.outputs.merge_branch }}" \
            || echo "Pull request already exists or could not be created."
